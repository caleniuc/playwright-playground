<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Playwright Playground</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  header {
    padding: 12px 20px;
    background: #1a1d27;
    border-bottom: 1px solid #2a2d3e;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #888;
  }

  header strong { color: #e0e0e0; font-size: 14px; }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #2ecc71;
    box-shadow: 0 0 6px #2ecc71;
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 16px;
    gap: 12px;
  }

  .editor-wrap {
    position: relative;
    flex: 1;
    min-height: 0;
  }

  textarea {
    width: 100%;
    height: 100%;
    background: #1a1d27;
    color: #a8d8a8;
    border: 1px solid #2a2d3e;
    border-radius: 8px;
    padding: 14px;
    font-family: 'JetBrains Mono', 'Fira Code', 'Menlo', monospace;
    font-size: 13px;
    line-height: 1.6;
    resize: none;
    outline: none;
    tab-size: 2;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: #5865f2; }

  .hint {
    position: absolute;
    bottom: 10px;
    right: 14px;
    font-size: 11px;
    color: #444;
    pointer-events: none;
  }

  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  button {
    padding: 8px 20px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s;
  }

  button:hover { opacity: 0.85; }

  #run-btn {
    background: #5865f2;
    color: #fff;
    font-weight: 600;
    padding: 8px 24px;
  }

  #clear-btn {
    background: #2a2d3e;
    color: #aaa;
  }

  #clear-output-btn {
    background: #2a2d3e;
    color: #aaa;
    margin-left: auto;
  }

  .output-panel {
    background: #1a1d27;
    border: 1px solid #2a2d3e;
    border-radius: 8px;
    padding: 14px;
    font-family: 'JetBrains Mono', 'Fira Code', 'Menlo', monospace;
    font-size: 12px;
    line-height: 1.6;
    max-height: 35vh;
    overflow-y: auto;
    min-height: 80px;
  }

  .entry { margin-bottom: 12px; }

  .entry-code {
    color: #555;
    margin-bottom: 4px;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .entry-code::before { content: '▶ '; color: #5865f2; }

  .entry-result { white-space: pre-wrap; word-break: break-all; }
  .entry-result.ok { color: #a8d8a8; }
  .entry-result.err { color: #ff6b6b; }

  .spinner {
    display: none;
    width: 14px; height: 14px;
    border: 2px solid #333;
    border-top-color: #5865f2;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="dot"></div>
  <strong>Playwright Playground</strong>
  <span>— <code>page</code> is your connected tab</span>
</header>

<div class="main">
  <div class="editor-wrap">
    <textarea id="code" spellcheck="false">async (page) => {
  return await page.locator('.ui-grid-row').count()
}</textarea>
    <div class="hint">Ctrl+Enter to run</div>
  </div>

  <div class="controls">
    <button id="run-btn">▶ Run</button>
    <button id="clear-btn">Clear</button>
    <div class="spinner" id="spinner"></div>
    <button id="clear-output-btn">Clear output</button>
  </div>

  <div class="output-panel" id="output"></div>
</div>

<script>
  const codeEl = document.getElementById('code');
  const outputEl = document.getElementById('output');
  const spinner = document.getElementById('spinner');

  async function run() {
    const code = codeEl.value.trim();
    if (!code) return;

    spinner.style.display = 'block';
    document.getElementById('run-btn').disabled = true;

    try {
      const res = await fetch('/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code }),
      });
      const data = await res.json();

      const entry = document.createElement('div');
      entry.className = 'entry';

      const codeDiv = document.createElement('div');
      codeDiv.className = 'entry-code';
      codeDiv.textContent = code.length > 120 ? code.slice(0, 120) + '…' : code;

      const resultDiv = document.createElement('div');
      resultDiv.className = 'entry-result ' + (data.ok ? 'ok' : 'err');
      resultDiv.textContent = data.output;

      entry.appendChild(codeDiv);
      entry.appendChild(resultDiv);
      outputEl.appendChild(entry);
      outputEl.scrollTop = outputEl.scrollHeight;
    } catch (e) {
      const entry = document.createElement('div');
      entry.className = 'entry';
      entry.innerHTML = `<div class="entry-result err">Network error: ${e.message}</div>`;
      outputEl.appendChild(entry);
    }

    spinner.style.display = 'none';
    document.getElementById('run-btn').disabled = false;
  }

  document.getElementById('run-btn').addEventListener('click', run);
  document.getElementById('clear-btn').addEventListener('click', () => codeEl.value = '');
  document.getElementById('clear-output-btn').addEventListener('click', () => outputEl.innerHTML = '');

  codeEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      run();
    }
    // Tab key inserts spaces
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = codeEl.selectionStart;
      const end = codeEl.selectionEnd;
      codeEl.value = codeEl.value.slice(0, start) + '  ' + codeEl.value.slice(end);
      codeEl.selectionStart = codeEl.selectionEnd = start + 2;
    }
  });
</script>
</body>
</html>
